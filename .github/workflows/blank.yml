name: Run UI Tests

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  ui-tests:
    matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
          
    runs-on: ${{ matrix.os }}

    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        
      - name: Grant execute permission for Gradle wrapper
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run UI tests
        run: ./gradlew clean test --stacktrace
        shell: bash
